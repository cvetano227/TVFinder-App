<html lang="en">

    <link rel="stylesheet" href="style.css" />

    <link

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

  <body>

      <div class="logo"><span class="logo-span">TV</span>Finder</div>
